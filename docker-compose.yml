services:
  db:
    image: postgres:16
    restart: always
    container_name: temp_backend
    environment:
      POSTGRES_DB : attendance_db
      POSTGRES_USER : postgres
      POSTGRES_PASSWORD : aryajain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: